name: "CD: Build Verification & Deployment"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
      - "docs/**"
      - "CACHING.md"
      - ".husky/**"
      - ".vscode/**"

permissions:
  contents: read

jobs:
  verify_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Verify Version (CI mode - no version bump, no git push)
        env:
          CI_VERIFY: "true"
        run: |
          node scripts/version-bump.js
          echo "Version in package.json: $(node -p "require('./package.json').version")"

      # Vercel's GitHub integration handles the actual deployment automatically.
      # This workflow only validates the build and confirms the version number.
      # The version was already bumped locally by the pre-push Husky hook.
