name: "CD: Automated Versioning & Deployment"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "package.json"
      - "public/build-meta.json"
      - "**/README.md"
      - "docs/**"
      - "CACHING.md"
      - ".husky/**"
      - ".vscode/**"

permissions:
  contents: write

jobs:
  version_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Automated Version Bump
        env:
          FORCE_VERSION_BUMP: "true"
        run: node scripts/version-bump.js

      - name: Commit and Push Version Change
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json public/build-meta.json

          # Only commit and push if there are actual changes to staged files
          if git diff --cached --quiet; then
            echo "No version changes to commit. Skipping push."
          else
            git commit -m "chore(release): bump version [release] [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Note: Vercel's automatic GitHub integration will pick up the second commit (the version bump)
      # and deploy it instantly. This ensures your live site always has the correct version number.
